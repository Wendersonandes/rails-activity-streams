# Files in the config/locales directory are used for internationalization and
# are automatically loaded by Rails. If you want to use locales other than
# English, add the necessary files in this directory.
#
# To use the locales, use `I18n.t`:
#
#     I18n.t "hello"
#
# In views, this is aliased to just `t`:
#
#     <%= t("hello") %>
#
# To use a different locale, set it with `I18n.locale`:
#
#     I18n.locale = :es
#
# This would use the information in config/locales/es.yml.
#
# To learn more about the API, please read the Rails Internationalization guide
# at https://guides.rubyonrails.org/i18n.html.
#
# Be aware that YAML interprets the following case-insensitive strings as
# booleans: `true`, `false`, `on`, `off`, `yes`, `no`. Therefore, these strings
# must be quoted to be interpreted as strings. For example:
#
#     en:
#       "yes": yup
#       enabled: "ON"

en:
  hello: "Hello world"
  notifications:
    post_published:
      message: "%{author} publicou um novo post."
      default_message: "Um novo post foi publicado."
    object_liked:
      message: "%{author} curtiu sua publicação."
      default_message: "Alguém curtiu sua publicação."
    object_commented:
      message: "%{author} comentou em sua publicação."
      default_message: "Alguém comentou em sua publicação."
    actor_mentioned:
      post_message: "%{author} mencionou você em uma publicação."
      comment_message: "%{author} mencionou você em um comentário."
      default_message: "Alguém mencionou você."
  activity:
    description:
      follow: "%{author} started following %{owner}"
      make_friend: "%{author} and %{owner} are now friends"
      join: "%{author} connected with %{owner}"
      like: "%{author} liked this"
      update: "%{author} updated their profile"
    audience:
      public:
        full: "Visible to everyone"
      visible:
        full: "Visible to %{audience}"
      hidden:
        full: "Visible to %{audience}"
  relation:
    public:
      name: "Public"
    follow:
      name: "Follow"
    custom:
      name: "Custom"
    reject:
      name: "Reject"
    owner:
      name: "Owner"
    local_admin:
      name: "Admin"
